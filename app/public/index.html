<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cipher - Private Messaging</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        #loginContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        #loginContainer.hidden {
            display: none !important;
        }
        .login-box {
            background: #1a1f26;
            padding: 40px;
            border-radius: 12px;
            width: 400px;
            border: 1px solid #2a3038;
        }
        .login-box h1 {
            color: #2D7A8A;
            text-align: center;
            margin-bottom: 30px;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #2a3038;
            border: 1px solid #3a4048;
            border-radius: 8px;
            color: #E8EAED;
            box-sizing: border-box;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #2D7A8A;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .login-box button:hover {
            background: #2a6f7f;
        }
        #mainContainer {
            display: none !important;
            width: 100%;
            height: 100vh;
            margin: 0;
            padding: 0;
        }
        #mainContainer.visible {
            display: flex !important;
        }
    </style>
</head>
<body style="margin: 0; padding: 0; overflow: hidden;">
    <!-- LOGIN MODAL -->
    <div id="loginContainer">
        <div class="login-box">
            <h1>🔐 Cipher</h1>
            <input type="email" id="loginEmail" placeholder="Email" value="alice@example.com">
            <input type="password" id="loginPassword" placeholder="Password" value="password123">
            <button onclick="handleLogin()">Login</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainContainer" style="display: none; width: 100%; height: 100vh; flex-direction: row;">
        <div class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">🔐 Cipher</h1>
                <p class="version" id="appVersion">v1.0.0</p>
            </div>

            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="Search conversations...">
            </div>

            <div class="conversations-list" id="conversationsList"></div>

            <button class="settings-button" id="settingsBtn">⚙️ Privacy Settings</button>
            <button class="settings-button" style="background: #d9534f; margin-top: 10px;" onclick="handleLogout()">🚪 Logout</button>
        </div>

        <div class="chat-container">
            <div class="chat-header">
                <div class="header-info">
                    <h2 class="chat-title" id="chatTitle">Select a conversation</h2>
                    <p class="user-status" id="userStatus">Offline</p>
                </div>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div class="no-conversation"><p>Select a conversation to start messaging</p></div>
            </div>

            <div class="input-area">
                <input type="text" id="messageInput" class="message-input" placeholder="Type a message..." disabled>
                <button id="sendBtn" class="send-button" disabled>Send</button>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
